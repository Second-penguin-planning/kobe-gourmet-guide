<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>掲載希望の企業様へ - 神戸 Gourmet Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .coming-wrap {
      min-height: calc(100vh - 68px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .coming-box {
      background: rgba(255,255,255,0.96);
      border: 1px solid #E8E2D9;
      border-top: 3px solid #B8860B;
      border-radius: 8px;
      padding: 60px 48px;
      max-width: 560px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.10);
    }
    .coming-icon {
      font-size: 3rem;
      margin-bottom: 24px;
    }
    .coming-eyebrow {
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      color: #B8860B;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .coming-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 600;
      color: #1A1A1A;
      margin-bottom: 8px;
      letter-spacing: 0.05em;
    }
    .coming-divider {
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #B8860B, transparent);
      margin: 20px auto;
    }
    .coming-text {
      font-size: 0.92rem;
      color: #555;
      line-height: 1.9;
      margin-bottom: 36px;
    }
    .coming-back {
      display: inline-block;
      padding: 12px 32px;
      background: #1A1A1A;
      color: #fff;
      border-radius: 4px;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      transition: background 0.2s;
      margin-right: 10px;
    }
    .coming-back:hover { background: #B8860B; }
    .coming-form-btn {
      display: inline-block;
      padding: 12px 32px;
      background: #C41E3A;
      color: #fff;
      border-radius: 4px;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      transition: background 0.2s;
    }
    .coming-form-btn:hover { background: #9e1828; }
    .btn-wrap { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    @media (max-width: 480px) {
      .coming-box { padding: 40px 24px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="site-logo"><a href="index.html" style="color:inherit">神戸 <span>Gourmet</span> Guide</a></div>
    <nav>
      <a href="index.html">トップ</a>
      <a href="map.html">地図</a>
    </nav>
  </div>
</header>

<div class="coming-wrap">
  <div class="coming-box">
    <div class="coming-icon">🏗️</div>
    <div class="coming-eyebrow">Coming Soon</div>
    <h1 class="coming-title">掲載希望の企業様へ</h1>
    <div class="coming-divider"></div>
    <p class="coming-text">
      掲載に関する詳細説明ページは<br>
      現在準備中です。<br><br>
      お急ぎの場合は、登録フォームより<br>
      お問い合わせください。<br>
      担当者よりご連絡いたします。
    </p>
    <div class="btn-wrap">
      <a href="index.html" class="coming-back">← トップへ戻る</a>
      <a href="register.html" class="coming-form-btn">📝 登録フォームへ</a>
    </div>
  </div>
</div>

<footer>
  <p>&copy; 2025 神戸 Gourmet Guide. All rights reserved.</p>
</footer>

</body>
</html>
