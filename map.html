<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map - Kobe Gourmet Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    #map-container { width:100%; height:calc(100vh - 64px); }

    .map-popup { min-width:220px; font-family:'Noto Sans JP',sans-serif; }
    .map-popup h3 { font-size:1rem; font-weight:700; margin-bottom:4px; color:#1B3A5C; }
    .map-popup p { font-size:0.82rem; color:#555; margin-bottom:10px; line-height:1.5; }
    .map-popup-actions { display:flex; flex-direction:column; gap:6px; }
    .map-popup-actions a {
      display:block; text-align:center; padding:7px;
      border-radius:4px; font-size:0.82rem; font-weight:700;
      text-decoration:none;
    }
    .map-btn-route { background:#1B3A5C; color:#fff; }
    .map-btn-detail { background:#fff; color:#1B3A5C; border:1.5px solid #1B3A5C; }

    /* 言語切り替えボタン */
    .lang-switcher { display:flex; gap:4px; align-items:center; }
    .lang-btn {
      padding:4px 10px; border-radius:4px; border:1px solid rgba(255,255,255,0.35);
      background:transparent; color:rgba(255,255,255,0.75);
      font-size:0.72rem; font-weight:700; cursor:pointer;
      letter-spacing:0.05em; transition:all 0.15s; font-family:inherit;
    }
    .lang-btn:hover { background:rgba(255,255,255,0.15); color:#fff; }
    .lang-btn.active { background:#fff; color:#1A1A1A; border-color:#fff; }

    /* ホテルバッジ */
    .hotel-badge {
      display:none; background:#E3F2FD; color:#1565C0;
      font-size:0.72rem; font-weight:700;
      padding:6px 12px; text-align:center;
      border-bottom:1px solid #BBDEFB;
    }
    .hotel-badge.visible { display:block; }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="site-logo"><a href="index.html" style="color:inherit">Kobe <span>Gourmet</span> Guide</a></div>
    <nav>
      <a href="index.html" data-i18n="nav.top">Top</a>
      <a href="map.html" data-i18n="nav.map">Map</a>
      <a href="admin.html" data-i18n="nav.admin">Admin</a>
      <div class="lang-switcher" style="margin-left:12px;">
        <button class="lang-btn" data-lang-btn="en" onclick="I18N.set('en')">EN</button>
        <button class="lang-btn" data-lang-btn="ja" onclick="I18N.set('ja')">JA</button>
        <button class="lang-btn" data-lang-btn="zh" onclick="I18N.set('zh')">繁</button>
      </div>
    </nav>
  </div>
</header>

<div class="hotel-badge" id="hotel-badge"></div>

<div id="map-container"></div>

<script src="config.local.js"></script>
<script src="config.js"></script>
<script src="js/tracking.js"></script>
<script src="js/i18n.js"></script>
<script src="js/sample-data.js"></script>
<script src="js/airtable.js"></script>

<script>
// ホテルバッジ表示
(function() {
  const hotel = TRACKING.getHotel();
  if (hotel && hotel !== 'unknown') {
    const badge = document.getElementById('hotel-badge');
    badge.textContent = `🏨 Welcome from ${hotel.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase())}`;
    badge.classList.add('visible');
  }
})();

const CIRCLES = ['','①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩',
  '⑪','⑫','⑬','⑭','⑮','⑯','⑰','⑱','⑲','⑳'];

window.initMap = function() {
  const map = new google.maps.Map(document.getElementById('map-container'), {
    center: { lat: 34.6913, lng: 135.1930 },
    zoom: 13,
    styles: [{ featureType:'poi', elementType:'labels', stylers:[{visibility:'off'}] }]
  });

  let openWindow = null;

  DATA.forEach(r => {
    if (!r.lat || !r.lng) return;

    const marker = new google.maps.Marker({
      position: { lat: parseFloat(r.lat), lng: parseFloat(r.lng) },
      map,
      title: r.name,
      label: {
        text: String(r.storeNumber),
        color: '#fff', fontWeight: 'bold', fontSize: '11px'
      },
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        fillColor: '#1B3A5C',
        fillOpacity: 1, strokeColor: '#C9A84C', strokeWeight: 2, scale: 16,
      }
    });

    // ホテル情報付きの経路URL（tracking.js の buildMapsUrl を使用）
    const routeUrl = buildMapsUrl(r);

    const label = I18N.t('card.directions');
    const detailLabel = I18N.t('card.detail');

    const infoWindow = new google.maps.InfoWindow({
      content: `
        <div class="map-popup">
          <h3>${CIRCLES[r.storeNumber] || r.storeNumber} ${r.name}</h3>
          <p>${r.dishName || ''}${r.hours ? '<br>' + r.hours : ''}${r.budget ? '<br>' + r.budget : ''}</p>
          <div class="map-popup-actions">
            <a class="map-btn-route" href="${routeUrl}" target="_blank" rel="noopener">
              📍 ${label}
            </a>
            <a class="map-btn-detail" href="store.html?id=${r.id}">
              ${detailLabel}
            </a>
          </div>
        </div>`
    });

    marker.addListener('click', () => {
      if (openWindow) openWindow.close();
      infoWindow.open(map, marker);
      openWindow = infoWindow;
    });
  });
};

let DATA = [];
async function loadAndInit() {
  try {
    DATA = CONFIG.airtable.apiKey ? await getRestaurants() : SAMPLE_RESTAURANTS;
    if (!DATA.length) DATA = SAMPLE_RESTAURANTS;
  } catch(e) { DATA = SAMPLE_RESTAURANTS; }

  const mapsKey = CONFIG.googleMaps.apiKey;
  if (mapsKey) {
    const script = document.createElement('script');
    script.src = `https://maps.googleapis.com/maps/api/js?key=${mapsKey}&callback=initMap`;
    script.async = true;
    document.head.appendChild(script);
  } else {
    document.getElementById('map-container').innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:16px;color:#888">' +
      '<p style="font-size:1.1rem">Google Maps API key is not set.</p></div>';
  }
}

loadAndInit();
</script>
</body>
</html>
