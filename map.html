<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>地図 - 神戸 Gourmet Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    #map-container { width:100%; height:calc(100vh - 64px); }
    .map-popup { min-width:200px; font-family:'Noto Sans JP',sans-serif; }
    .map-popup h3 { font-size:1rem; font-weight:700; margin-bottom:4px; }
    .map-popup p { font-size:0.82rem; color:#555; margin-bottom:8px; }
    .map-popup a {
      display:block; text-align:center; padding:6px;
      background:#C41E3A; color:#fff; border-radius:4px;
      font-size:0.82rem; font-weight:600; text-decoration:none;
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="site-logo"><a href="index.html" style="color:inherit">神戸 <span>Gourmet</span> Guide</a></div>
    <nav>
      <a href="index.html">トップ</a>
      <a href="map.html">地図</a>
      <a href="admin.html">管理</a>
    </nav>
  </div>
</header>

<div id="map-container"></div>

<script>
  window.initMap = function() {
    const map = new google.maps.Map(document.getElementById('map-container'), {
      center: { lat: 34.6913, lng: 135.1930 },
      zoom: 13,
      styles: [{ featureType:'poi', elementType:'labels', stylers:[{visibility:'off'}] }]
    });

    const circles = ['','①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩',
      '⑪','⑫','⑬','⑭','⑮','⑯','⑰','⑱','⑲','⑳'];

    DATA.forEach(r => {
      if (!r.lat || !r.lng) return;
      const marker = new google.maps.Marker({
        position: { lat: parseFloat(r.lat), lng: parseFloat(r.lng) },
        map,
        title: r.name,
        label: { text: String(r.storeNumber), color:'#fff', fontWeight:'bold', fontSize:'11px' },
        icon: {
          path: google.maps.SymbolPath.CIRCLE,
          fillColor: r.category === 'L' ? '#B8860B' : r.category === 'M' ? '#C41E3A' : '#1A1A1A',
          fillOpacity: 1, strokeColor: '#fff', strokeWeight: 2, scale: 16,
        }
      });
      const routeUrl = `https://www.google.com/maps/dir/?api=1&destination=${r.lat},${r.lng}`;
      const infoWindow = new google.maps.InfoWindow({
        content: `
          <div class="map-popup">
            <h3>${circles[r.storeNumber] || r.storeNumber} ${r.name}</h3>
            <p>${r.dishName}<br>${r.hours || ''}</p>
            <a href="${routeUrl}" target="_blank" rel="noopener">📍 経路案内</a>
          </div>`
      });
      marker.addListener('click', () => infoWindow.open(map, marker));
    });
  };
</script>

<script src="config.local.js"></script>
<script src="config.js"></script>
<script src="js/sample-data.js"></script>
<script src="js/airtable.js"></script>
<script>
  let DATA = [];
  async function loadAndInit() {
    try {
      DATA = CONFIG.airtable.apiKey ? await getRestaurants() : SAMPLE_RESTAURANTS;
      if (!DATA.length) DATA = SAMPLE_RESTAURANTS;
    } catch(e) { DATA = SAMPLE_RESTAURANTS; }

    const mapsKey = CONFIG.googleMaps.apiKey;
    if (mapsKey) {
      const script = document.createElement('script');
      script.src = `https://maps.googleapis.com/maps/api/js?key=${mapsKey}&callback=initMap`;
      script.async = true;
      document.head.appendChild(script);
    } else {
      document.getElementById('map-container').innerHTML =
        '<div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:16px;color:#888">' +
        '<p style="font-size:1.1rem">Google Maps APIキーを config.local.js に設定してください。</p></div>';
    }
  }
  loadAndInit();
</script>
</body>
</html>
