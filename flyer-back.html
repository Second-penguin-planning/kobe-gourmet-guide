<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KOBE FOOD MAP - Back</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', 'Noto Sans JP', sans-serif; background: #e8e8e8; }

    .controls {
      position: fixed; top: 12px; right: 12px; z-index: 999; display: flex; gap: 8px;
    }
    .controls button {
      padding: 8px 16px; border: none; border-radius: 6px;
      font-size: 0.85rem; font-weight: 600; cursor: pointer;
      background: #1B3A5C; color: #fff;
    }
    .controls button:hover { background: #C41E3A; }

    .flyer-page {
      width: 210mm; height: 297mm;
      background: #FAFAF8;
      margin: 20px auto;
      box-shadow: 0 4px 24px rgba(0,0,0,0.2);
      display: flex; flex-direction: column; overflow: hidden;
    }

    /* Header */
    .fm-header {
      background: #1B3A5C; color: #fff;
      padding: 3.5mm 6mm;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .fm-title { font-size: 16pt; font-weight: 900; letter-spacing: 0.08em; color: #fff; }
    .fm-title span { color: #C9A84C; }
    .fm-subtitle { font-size: 6.5pt; color: rgba(255,255,255,0.7); margin-top: 1mm; }
    .fm-page-label {
      background: rgba(255,255,255,0.15);
      color: #fff; font-size: 6.5pt; font-weight: 700;
      padding: 1.5mm 3mm; border-radius: 1.5mm; letter-spacing: 0.1em;
    }

    /* Grid */
    .fm-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.8mm;
      padding: 2mm 3mm 1.5mm;
      flex: 1;
    }

    /* Card */
    .fm-card {
      background: #fff;
      border: 0.3mm solid #DDD8D0;
      border-radius: 1.5mm;
      overflow: hidden;
      display: flex; flex-direction: column;
    }
    .fm-card-photo {
      width: 100%; height: 23mm;
      object-fit: cover; display: block; flex-shrink: 0;
    }
    .fm-card-no-photo {
      width: 100%; height: 23mm;
      background: linear-gradient(135deg, #e8e4dc 0%, #d4cfc5 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 16pt; flex-shrink: 0;
    }
    .fm-card-body {
      padding: 1.5mm 1.8mm 1mm;
      flex: 1; display: flex; flex-direction: column; gap: 0.5mm;
    }
    .fm-card-name { font-size: 7pt; font-weight: 700; color: #1A1A1A; line-height: 1.3; }
    .fm-card-genre { font-size: 6pt; color: #1B3A5C; font-weight: 600; }
    .fm-card-meta {
      display: flex; align-items: flex-end;
      justify-content: space-between; margin-top: auto; padding-top: 1mm;
    }
    .fm-card-info { display: flex; flex-direction: column; gap: 0.5mm; }
    .fm-card-walk { font-size: 5.5pt; color: #555; font-weight: 600; }
    .fm-card-budget { font-size: 6.5pt; color: #C9A84C; font-weight: 700; }
    .fm-card-qr img, .fm-card-qr canvas {
      width: 16mm !important; height: 16mm !important; display: block;
    }
    .fm-card-qr-label {
      font-size: 4pt; color: #888; text-align: center;
      margin-top: 0.3mm; font-weight: 700; letter-spacing: 0.05em;
    }

    /* Map strip */
    .fm-map-strip {
      margin: 0 3mm 1.5mm;
      border: 0.3mm solid #DDD8D0;
      border-radius: 1.5mm;
      overflow: hidden;
      flex-shrink: 0;
    }
    .fm-map-label {
      background: #1B3A5C; color: #fff;
      font-size: 6pt; font-weight: 700;
      padding: 1mm 3mm; letter-spacing: 0.08em;
    }
    #back-map { width: 100%; height: 32mm; }

    /* Footer */
    .fm-footer {
      background: #1B3A5C;
      padding: 1.8mm 4mm;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .fm-footer-text { color: rgba(255,255,255,0.8); font-size: 5.5pt; font-weight: 600; }
    .fm-footer-text span { color: #C9A84C; }
    .fm-footer-qr-wrap { display: flex; align-items: center; gap: 2mm; }
    .fm-footer-qr-label { color: rgba(255,255,255,0.7); font-size: 5pt; font-weight: 600; text-align: right; line-height: 1.5; }
    .fm-footer-qr img, .fm-footer-qr canvas { width: 11mm !important; height: 11mm !important; }

    @page { size: A4 portrait; margin: 0; }
    @media print {
      body { background: none; }
      .flyer-page { margin: 0; box-shadow: none; }
      .controls { display: none; }
    }
  </style>
</head>
<body>

<div class="controls">
  <button onclick="window.print()">🖨️ Print / PDF</button>
  <button onclick="location.href='flyer-front.html'">← Front Side</button>
  <button onclick="location.href='index.html'">← Top</button>
</div>

<div class="flyer-page">

  <div class="fm-header">
    <div>
      <div class="fm-title">KOBE <span>FOOD</span> MAP</div>
      <div class="fm-subtitle">Scan QR → Open Google Maps → Walk to Restaurant</div>
    </div>
    <div class="fm-page-label">BACK SIDE · ⑫ – ⑳</div>
  </div>

  <div class="fm-grid" id="back-grid"></div>

  <!-- Map -->
  <div class="fm-map-strip">
    <div class="fm-map-label">📍 KOBE RESTAURANT MAP — All Locations</div>
    <div id="back-map"></div>
  </div>

  <div class="fm-footer">
    <div class="fm-footer-text">
      KOBE <span>FOOD MAP</span> · More info &amp; all restaurants online →
    </div>
    <div class="fm-footer-qr-wrap">
      <div class="fm-footer-qr-label">Full List<br>Online</div>
      <div class="fm-footer-qr" id="footer-qr-back"></div>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="config.local.js"></script>
<script src="config.js"></script>
<script src="js/sample-data.js"></script>
<script src="js/airtable.js"></script>
<script src="js/qrcode-gen.js"></script>

<script>
const GENRE_EN = {
  '和食':'Japanese','海鮮':'Seafood','フレンチ':'French','中華':'Chinese',
  '焼肉':'BBQ / Wagyu','ラーメン':'Ramen','カフェ':'Cafe','イタリアン':'Italian',
  'スペイン料理':'Spanish','薬膳・中華':'Herbal Chinese','洋食':'Western',
  'うどん':'Udon','バー':'Craft Beer Bar','串揚げ':'Kushiage',
  '鉄板焼き':'Teppanyaki','スイーツ':'Sweets / Dessert',
};

function makeCard(r) {
  const div = document.createElement('div');
  div.className = 'fm-card';
  const genreEn = GENRE_EN[r.genre] || r.genre || '';
  const budget = r.budget || '';
  const walk = r.walkTime ? `🚶 ${r.walkTime} min` : '';
  const photo = r.photos[0];
  div.innerHTML = `
    ${photo
      ? `<img class="fm-card-photo" src="${photo}" alt="${r.name}" loading="lazy">`
      : `<div class="fm-card-no-photo">🍽️</div>`}
    <div class="fm-card-body">
      <div class="fm-card-name">${r.name}</div>
      <div class="fm-card-genre">${genreEn}</div>
      <div class="fm-card-meta">
        <div class="fm-card-info">
          ${walk ? `<div class="fm-card-walk">${walk}</div>` : ''}
          ${budget ? `<div class="fm-card-budget">${budget}</div>` : ''}
        </div>
        <div>
          <div class="fm-card-qr" id="qr-b-${r.id}"></div>
          <div class="fm-card-qr-label">ROUTE QR</div>
        </div>
      </div>
    </div>
  `;
  return div;
}

function initMap(data) {
  const key = CONFIG.googleMaps.apiKey;
  if (!key) {
    document.getElementById('back-map').innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#aaa;font-size:7pt;background:#f5f5f5">Map requires Google Maps API key</div>';
    return;
  }
  window._backMapCb = function() {
    const map = new google.maps.Map(document.getElementById('back-map'), {
      center: { lat: 34.6913, lng: 135.1930 }, zoom: 12,
      disableDefaultUI: true,
      styles: [{ featureType:'poi', elementType:'labels', stylers:[{visibility:'off'}] }]
    });
    data.forEach((r, i) => {
      if (!r.lat || !r.lng) return;
      new google.maps.Marker({
        position: { lat: parseFloat(r.lat), lng: parseFloat(r.lng) },
        map,
        label: { text: String(r.storeNumber || i+1), color:'#fff', fontWeight:'bold', fontSize:'8px' },
        icon: {
          path: google.maps.SymbolPath.CIRCLE,
          fillColor: '#1B3A5C', fillOpacity: 1,
          strokeColor: '#C9A84C', strokeWeight: 1.5, scale: 12,
        }
      });
    });
  };
  const s = document.createElement('script');
  s.src = `https://maps.googleapis.com/maps/api/js?key=${key}&callback=_backMapCb`;
  s.async = true;
  document.head.appendChild(s);
}

async function init() {
  let data;
  try {
    data = CONFIG.airtable.apiKey ? await getRestaurants() : SAMPLE_RESTAURANTS;
    if (!data || !data.length) data = SAMPLE_RESTAURANTS;
  } catch(e) { data = SAMPLE_RESTAURANTS; }

  // 裏面：12店舗（12番目〜）
  const backList = data.slice(11, 23);
  const grid = document.getElementById('back-grid');
  backList.forEach(r => grid.appendChild(makeCard(r)));

  setTimeout(() => {
    backList.forEach(r => {
      const el = document.getElementById(`qr-b-${r.id}`);
      if (el) generateQR(el, r, 60);
    });
    new QRCode(document.getElementById('footer-qr-back'), {
      text: CONFIG.site.url, width: 42, height: 42,
      colorDark: '#fff', colorLight: '#1B3A5C',
      correctLevel: QRCode.CorrectLevel.M
    });
  }, 150);

  initMap(data);
}

init();
</script>
</body>
</html>
