<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurant Detail - Kobe Gourmet Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ===== 言語切り替えボタン ===== */
    .lang-switcher {
      display: flex; gap: 4px; align-items: center;
    }
    .lang-btn {
      padding: 4px 10px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.35);
      background: transparent; color: rgba(255,255,255,0.75);
      font-size: 0.72rem; font-weight: 700; cursor: pointer;
      letter-spacing: 0.05em; transition: all 0.15s;
      font-family: inherit;
    }
    .lang-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
    .lang-btn.active { background: #fff; color: #1A1A1A; border-color: #fff; }

    /* ===== クーポンバナー ===== */
    .coupon-banner {
      border: 2px dashed #C9A84C;
      border-radius: 8px;
      background: #FFFBF0;
      padding: 14px 16px;
      text-align: center;
      margin: 20px 0;
    }
    .coupon-title {
      font-size: 0.7rem; font-weight: 900; letter-spacing: 0.15em;
      color: #7A5C00; text-transform: uppercase; margin-bottom: 6px;
    }
    .coupon-body {
      font-size: 1rem; font-weight: 700; color: #1A1A1A; line-height: 1.5;
    }
    .coupon-note {
      font-size: 0.72rem; color: #888; margin-top: 6px;
    }

    /* ===== チェックインボタン ===== */
    .btn-checkin {
      display: block; width: 100%;
      padding: 14px; border: none; border-radius: 8px;
      background: #1B3A5C; color: #fff;
      font-size: 1rem; font-weight: 700; cursor: pointer;
      font-family: inherit; transition: background 0.2s;
      letter-spacing: 0.03em; margin: 12px 0 24px;
    }
    .btn-checkin:hover { background: #0d2440; }
    .btn-checkin:disabled { background: #2E7D32; cursor: default; }

    /* ===== hotel バッジ ===== */
    .hotel-badge {
      display: none;
      background: #E3F2FD; color: #1565C0;
      font-size: 0.72rem; font-weight: 700;
      padding: 6px 12px; text-align: center;
      border-bottom: 1px solid #BBDEFB;
    }
    .hotel-badge.visible { display: block; }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="site-logo"><a href="index.html" style="color:inherit">Kobe <span>Gourmet</span> Guide</a></div>
    <nav>
      <a href="index.html" data-i18n="nav.top">Top</a>
      <a href="map.html" data-i18n="nav.map">Map</a>
      <a href="admin.html" data-i18n="nav.admin">Admin</a>
      <div class="lang-switcher" style="margin-left:12px;">
        <button class="lang-btn" data-lang-btn="en" onclick="I18N.set('en')">EN</button>
        <button class="lang-btn" data-lang-btn="ja" onclick="I18N.set('ja')">JA</button>
        <button class="lang-btn" data-lang-btn="zh" onclick="I18N.set('zh')">繁</button>
      </div>
    </nav>
  </div>
</header>

<div class="hotel-badge" id="hotel-badge"></div>

<main>
  <div class="store-detail" id="detail-root">
    <div class="loading"><div class="spinner"></div><span>Loading...</span></div>
  </div>
</main>

<footer>
  <p data-i18n="footer.copy">&copy; 2025 Kobe Gourmet Guide / Second Penguin Planning.</p>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="config.local.js"></script>
<script src="config.js"></script>
<script src="js/tracking.js"></script>
<script src="js/i18n.js"></script>
<script src="js/airtable.js"></script>
<script src="js/sample-data.js"></script>
<script src="js/qrcode-gen.js"></script>

<script>
// ホテルバッジ表示
(function showHotelBadge() {
  const hotel = TRACKING.getHotel();
  if (hotel && hotel !== 'unknown') {
    const badge = document.getElementById('hotel-badge');
    badge.textContent = `🏨 Welcome from ${hotel.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase())}`;
    badge.classList.add('visible');
  }
})();

function circleNum(n) {
  const circles = ['','①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩',
    '⑪','⑫','⑬','⑭','⑮','⑯','⑰','⑱','⑲','⑳'];
  return circles[n] || `(${n})`;
}

function render(r) {
  const root = document.getElementById('detail-root');
  document.title = `${r.name} - Kobe Gourmet Guide`;

  const photos = r.photos.length
    ? r.photos.slice(0, 4).map((p, i) =>
        `<img src="${p}" alt="${r.name} photo${i+1}" loading="lazy">`
      ).join('')
    : `<div style="background:#eee;height:240px;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:2rem;color:#aaa;grid-column:1/-1">🍽️</div>`;

  const mapsUrl = buildMapsUrl(r);
  const couponText = r.coupon || 'Show this screen: 1 FREE drink or dessert! 🍹';

  root.innerHTML = `
    <p style="margin-bottom:16px">
      <a href="index.html" style="color:#888;font-size:0.9rem">← <span data-i18n="nav.top">Top</span></a>
    </p>

    <div class="detail-photos">${photos}</div>

    <h1 class="detail-name">${circleNum(r.storeNumber)} ${r.name}</h1>
    <p class="detail-dish">${r.dishName || ''}</p>
    <p class="detail-desc">${r.description || ''}</p>

    <!-- クーポンバナー -->
    <div class="coupon-banner">
      <div class="coupon-title" data-i18n="card.coupon">🎁 HOTEL GUEST EXCLUSIVE</div>
      <div class="coupon-body js-coupon-body">${couponText}</div>
      <div class="coupon-note" data-i18n="card.coupon_sub">Show this screen at the restaurant</div>
    </div>

    <!-- チェックインボタン -->
    <button class="btn-checkin" id="checkin-btn"
            onclick="checkIn('${r.name}', this)"
            data-i18n="card.checkin">📍 I've Arrived — Check In</button>

    <!-- 店舗情報テーブル -->
    <div class="detail-info">
      <table>
        <tr><th data-i18n="detail.address">Address</th><td>${r.address || '—'}</td></tr>
        <tr><th data-i18n="detail.hours">Hours</th><td>${r.hours || '—'}</td></tr>
        <tr><th data-i18n="detail.closed">Closed</th><td>${r.closed || '—'}</td></tr>
        <tr><th data-i18n="detail.phone">Phone</th><td>${r.phone ? `<a href="tel:${r.phone}">${r.phone}</a>` : '—'}</td></tr>
        <tr><th data-i18n="detail.genre">Genre</th><td>${r.genre || '—'}</td></tr>
        ${r.budget ? `<tr><th data-i18n="detail.budget">Budget</th><td>${r.budget}</td></tr>` : ''}
        ${r.walkTime ? `<tr><th>🚶</th><td>${r.walkTime} <span data-i18n="card.walk">min walk</span></td></tr>` : ''}
        ${r.recommended ? `<tr><th data-i18n="detail.recommend">Recommended</th><td>${r.recommended}</td></tr>` : ''}
        ${r.instagram ? `<tr><th>Instagram</th><td><a href="https://instagram.com/${r.instagram}" target="_blank" rel="noopener">@${r.instagram}</a></td></tr>` : ''}
        ${r.homepage ? `<tr><th>HP</th><td><a href="${r.homepage}" target="_blank" rel="noopener">${r.homepage}</a></td></tr>` : ''}
      </table>
    </div>

    <!-- 経路案内 -->
    <a href="${mapsUrl}" target="_blank" rel="noopener" class="route-btn"
       data-i18n="card.directions">📍 Get Directions</a>

    <!-- QRコード -->
    <div style="text-align:center;margin-bottom:32px">
      <p style="font-size:0.8rem;color:#888;margin-bottom:8px">QR Code for directions</p>
      <div id="detail-qr" style="display:inline-block"></div>
    </div>
  `;

  // i18n 適用（テーブル内 data-i18n を含む）
  root.querySelectorAll('[data-i18n]').forEach(el => {
    const val = I18N.t(el.dataset.i18n);
    if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
      el.placeholder = val;
    } else if (el.tagName === 'A' || el.tagName === 'BUTTON' || el.tagName === 'DIV' || el.tagName === 'SPAN' || el.tagName === 'TH') {
      el.textContent = val;
    }
  });
  // クーポン本文は i18n で上書きしない
  root.querySelector('.js-coupon-body').textContent = couponText;

  generateQR(document.getElementById('detail-qr'), r, 120);
}

async function init() {
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  if (!id) { location.href = 'index.html'; return; }
  try {
    let r;
    if (CONFIG.airtable.apiKey) {
      r = await airtable.fetchById(id);
    } else {
      r = SAMPLE_RESTAURANTS.find(x => x.id === id);
    }
    if (!r) throw new Error('not found');
    render(r);
  } catch (e) {
    const r = SAMPLE_RESTAURANTS.find(x => x.id === id);
    if (r) render(r);
    else document.getElementById('detail-root').innerHTML =
      '<p style="color:#888;text-align:center;padding:60px">Restaurant not found.</p>';
  }
}

// 言語切り替え時に再描画
document.addEventListener('langchange', () => init());

init();
</script>
</body>
</html>
