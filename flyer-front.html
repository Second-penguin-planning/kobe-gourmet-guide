<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KOBE FOOD MAP - Front</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      background: #e8e8e8;
    }

    .controls {
      position: fixed; top: 12px; right: 12px; z-index: 999;
      display: flex; gap: 8px;
    }
    .controls button {
      padding: 8px 16px; border: none; border-radius: 6px;
      font-size: 0.85rem; font-weight: 600; cursor: pointer;
      background: #1B3A5C; color: #fff;
    }
    .controls button:hover { background: #C41E3A; }

    /* ===== A4ページ ===== */
    .flyer-page {
      width: 210mm;
      height: 297mm;
      background: #FAFAF8;
      margin: 20px auto;
      box-shadow: 0 4px 24px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ===== ヘッダー ===== */
    .fm-header {
      background: #1B3A5C;
      color: #fff;
      padding: 5mm 6mm 4mm;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .fm-title-block {}

    .fm-title {
      font-size: 22pt;
      font-weight: 900;
      letter-spacing: 0.08em;
      line-height: 1;
      color: #fff;
    }

    .fm-title span { color: #C9A84C; }

    .fm-subtitle {
      font-size: 7.5pt;
      font-weight: 400;
      color: rgba(255,255,255,0.75);
      letter-spacing: 0.06em;
      margin-top: 2mm;
    }

    .fm-instruction {
      background: #C9A84C;
      color: #1B3A5C;
      border-radius: 2mm;
      padding: 2mm 3.5mm;
      text-align: center;
      font-size: 6.5pt;
      font-weight: 700;
      line-height: 1.6;
      white-space: nowrap;
    }

    /* ===== カードグリッド ===== */
    .fm-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2mm;
      padding: 2mm 3mm;
      flex: 1;
    }

    /* ===== 店舗カード ===== */
    .fm-card {
      background: #fff;
      border: 0.3mm solid #DDD8D0;
      border-radius: 1.5mm;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .fm-card-photo {
      width: 100%;
      height: 26mm;
      object-fit: cover;
      display: block;
      flex-shrink: 0;
    }

    .fm-card-no-photo {
      width: 100%;
      height: 26mm;
      background: linear-gradient(135deg, #e8e4dc 0%, #d4cfc5 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18pt;
      flex-shrink: 0;
    }

    .fm-card-body {
      padding: 1.5mm 2mm 1mm;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.5mm;
    }

    .fm-card-name {
      font-size: 7.5pt;
      font-weight: 700;
      color: #1A1A1A;
      line-height: 1.3;
    }

    .fm-card-genre {
      font-size: 6.5pt;
      color: #1B3A5C;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    .fm-card-meta {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-top: 1.5mm;
      padding-top: 0;
    }

    .fm-card-info {
      display: flex;
      flex-direction: column;
      gap: 0.8mm;
    }

    .fm-card-walk {
      font-size: 6pt;
      color: #555;
      font-weight: 600;
    }

    .fm-card-budget {
      font-size: 7pt;
      color: #C9A84C;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .fm-card-qr {
      flex-shrink: 0;
    }

    .fm-card-qr img,
    .fm-card-qr canvas {
      width: 18mm !important;
      height: 18mm !important;
      display: block;
    }

    .fm-card-qr-label {
      font-size: 4.5pt;
      color: #888;
      text-align: center;
      margin-top: 0.5mm;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    /* ===== フッター ===== */
    .fm-footer {
      background: #1B3A5C;
      padding: 2mm 4mm;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .fm-footer-text {
      color: rgba(255,255,255,0.8);
      font-size: 6pt;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .fm-footer-text span { color: #C9A84C; }

    .fm-footer-qr-wrap {
      display: flex;
      align-items: center;
      gap: 2mm;
    }

    .fm-footer-qr-label {
      color: rgba(255,255,255,0.7);
      font-size: 5.5pt;
      font-weight: 600;
      text-align: right;
      line-height: 1.5;
    }

    .fm-footer-qr img,
    .fm-footer-qr canvas {
      width: 12mm !important;
      height: 12mm !important;
    }

    /* ===== 印刷 ===== */
    @page { size: A4 portrait; margin: 0; }
    @media print {
      body { background: none; }
      .flyer-page { margin: 0; box-shadow: none; }
      .controls { display: none; }
    }
  </style>
</head>
<body>

<div class="controls">
  <button onclick="window.print()">🖨️ Print / PDF</button>
  <button onclick="location.href='flyer-back.html'">Back Side →</button>
  <button onclick="location.href='index.html'">← Top</button>
</div>

<div class="flyer-page">

  <!-- Header -->
  <div class="fm-header">
    <div class="fm-title-block">
      <div class="fm-title">KOBE <span>FOOD</span> MAP</div>
      <div class="fm-subtitle">20 Popular Restaurants · Scan QR &amp; Walk to Any Restaurant</div>
    </div>
    <div class="fm-instruction">
      📱 HOW TO USE<br>
      Scan the QR code →<br>
      Follow Google Maps
    </div>
  </div>

  <!-- Store Grid (11 stores) -->
  <div class="fm-grid" id="front-grid"></div>

  <!-- Footer -->
  <div class="fm-footer">
    <div class="fm-footer-text">
      KOBE <span>FOOD MAP</span> · More restaurants on our website →
    </div>
    <div class="fm-footer-qr-wrap">
      <div class="fm-footer-qr-label">More Restaurants<br>& Info</div>
      <div class="fm-footer-qr" id="footer-qr-front"></div>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="config.local.js"></script>
<script src="config.js"></script>
<script src="js/sample-data.js"></script>
<script src="js/airtable.js"></script>
<script src="js/qrcode-gen.js"></script>

<script>
const GENRE_EN = {
  '和食':'Japanese','海鮮':'Seafood','フレンチ':'French','中華':'Chinese',
  '焼肉':'BBQ / Wagyu','ラーメン':'Ramen','カフェ':'Cafe','イタリアン':'Italian',
  'スペイン料理':'Spanish','薬膳・中華':'Herbal Chinese','洋食':'Western',
  'うどん':'Udon','バー':'Craft Beer Bar','串揚げ':'Kushiage',
  '鉄板焼き':'Teppanyaki','スイーツ':'Sweets / Dessert',
};

function makeCard(r, index) {
  const div = document.createElement('div');
  div.className = 'fm-card';

  const genreEn = GENRE_EN[r.genre] || r.genre || '';
  const budget = r.budget || '';
  const walk = r.walkTime ? `🚶 ${r.walkTime} min` : '';
  const photo = r.photos[0];

  div.innerHTML = `
    ${photo
      ? `<img class="fm-card-photo" src="${photo}" alt="${r.name}" loading="lazy">`
      : `<div class="fm-card-no-photo">🍽️</div>`}
    <div class="fm-card-body">
      <div class="fm-card-name">${r.name}</div>
      <div class="fm-card-genre">${genreEn}</div>
      <div class="fm-card-meta">
        <div class="fm-card-info">
          ${walk ? `<div class="fm-card-walk">${walk}</div>` : ''}
          ${budget ? `<div class="fm-card-budget">${budget}</div>` : ''}
        </div>
        <div>
          <div class="fm-card-qr" id="qr-f-${r.id}"></div>
          <div class="fm-card-qr-label">ROUTE QR</div>
        </div>
      </div>
    </div>
  `;
  return div;
}

async function init() {
  let data;
  try {
    data = CONFIG.airtable.apiKey ? await getRestaurants() : SAMPLE_RESTAURANTS;
    if (!data || !data.length) data = SAMPLE_RESTAURANTS;
  } catch(e) { data = SAMPLE_RESTAURANTS; }

  // 表面：最初の11店舗
  const frontList = data.slice(0, 11);
  const grid = document.getElementById('front-grid');
  frontList.forEach((r, i) => grid.appendChild(makeCard(r, i)));

  // QR生成
  setTimeout(() => {
    frontList.forEach(r => {
      const el = document.getElementById(`qr-f-${r.id}`);
      if (el) generateQR(el, r, 68);
    });
    // フッターQR（Webサイト）
    new QRCode(document.getElementById('footer-qr-front'), {
      text: CONFIG.site.url, width: 45, height: 45,
      colorDark: '#fff', colorLight: '#1B3A5C',
      correctLevel: QRCode.CorrectLevel.M
    });
  }, 150);
}

init();
</script>
</body>
</html>
